<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Oslo Trip</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121210">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Oslo Trip">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="quick-links">
    <a class="quick-link" href="#" onclick="openApp('voiapp://','https://voiapp.io');return false">
      <span class="quick-link-icon"><img src="icons/voi.png" alt="Voi" width="40" height="40" style="border-radius:10px"></span>
      Voi
    </a>
    <a class="quick-link" href="#" onclick="openApp('uber://','https://m.uber.com');return false">
      <span class="quick-link-icon"><img src="icons/uber.png" alt="Uber" width="40" height="40" style="border-radius:10px"></span>
      Uber
    </a>
    <a class="quick-link" href="#" onclick="openApp('ruter://','https://rfruter.page.link/reise');return false">
      <span class="quick-link-icon"><img src="icons/ruter.png" alt="Ruter" width="40" height="40" style="border-radius:10px"></span>
      Ruter
    </a>
  </div>

  <div class="map-hero">
    <div class="map-el" id="map"></div>
  </div>

  <div class="nav" id="nav"></div>

  <div id="content"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBt0ps2bdgl3irhGu4E4kNB1m-BELR7YL8&libraries=places&callback=onGoogleMapsReady">
  </script>
</body>
</html>
